services:
  - type: web
    name: vantage-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: "npm install"
    startCommand: "node index.js"
    healthCheckPath: /allHoldings
    envVars:
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: vantage-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        sync: false
