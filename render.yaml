services:
  - type: web
    name: vantage-backend
    env: node
    plan: free
    region: oregon
    root: backend
    buildCommand: "npm install"
    startCommand: "node index.js"
    envVars:
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: vantage-frontend
    env: static
    root: frontend
    buildCommand: "npm install && npm run build"
    publishPath: build
    envVars:
      - key: REACT_APP_API_URL
        sync: false
